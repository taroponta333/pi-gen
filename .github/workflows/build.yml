name: Build TurboPi OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Branch
        run: |
          git branch
          git rev-parse --abbrev-ref HEAD

      # 1. Dockerビルドと最も相性が良い方法でQEMUをセットアップ
      - name: Setup QEMU for ARM (Docker-friendly)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      # 2. Windowsの改行コード(CRLF)をLinux用(LF)に自動修正
      - name: Fix Line Endings and Permissions
        run: |
          sed -i 's/\r$//' stage2/05-custom-apps/*.sh || true
          chmod +x stage2/05-custom-apps/*.sh || true

      # 3. config ファイルの検証と、Dockerビルド用のセーフティ設定を追記
      - name: Prepare Config File
        run: |
          if [ ! -f config ]; then
            echo "Warning: config file not found. Creating default..."
            echo "IMG_NAME='TurboPiOS'" > config
            echo "RELEASE='bookworm'" >> config
            echo "ENABLE_SSH=1" >> config
            echo "FIRST_USER_NAME='pi'" >> config
            echo "FIRST_USER_PASS='raspberry'" >> config
            echo "USE_QEMU=1" >> config
          fi
          # Dockerコンテナが途中で消えてエラーログを紛失するのを防ぐ設定を追記
          echo "PRESERVE_CONTAINER=1" >> config

      - name: Clean old build
        run: |
          sudo rm -rf work deploy

      # 4. Dockerを使ってビルドを実行
      - name: Build TurboPi OS
        shell: bash
        run: |
          chmod +x build-docker.sh
          bash ./build-docker.sh

      # 5. デバッグ用：進捗やエラーのログを確認するためのステップ
      - name: Show deploy contents
        if: always()
        run: |
          echo "===== DEPLOY ====="
          find deploy 2>/dev/null || true

      - name: Show debootstrap log
        if: always()
        run: |
          find . -name debootstrap.log
          cat work/TurboPiOS/stage0/debootstrap.log 2>/dev/null || true

      # 6. 完成したOSイメージ（またはエラーログ）を成果物として保存
      - name: Upload Image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TurboPiOS
          path: |
            deploy/**
            work/**/deploy/**
