name: Build TurboPi OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Branch
        run: |
          git branch
          git rev-parse --abbrev-ref HEAD

      - name: Install QEMU
        run: |
          sudo apt update
          sudo apt install -y \
            qemu-user-static \
            qemu-user-binfmt \
            binfmt-support

      - name: Clean old build
        run: |
          sudo rm -rf work deploy

      - name: Build TurboPi OS
        shell: bash
        run: |
          chmod +x build-docker.sh
          bash ./build-docker.sh

      - name: Show deploy
        if: always()
        run: |
          echo "===== DEPLOY ====="
          find deploy || true

      - name: Upload Image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TurboPiOS
          path: |
            deploy/**
            work/**/deploy/**
