name: Build TurboPi OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # 1. まずはユーザー自身のリポジトリ（configやカスタムスクリプト）を一時フォルダに持ってくる
      - name: Checkout User Customizations
        uses: actions/checkout@v4
        with:
          path: user-custom

      # 2. 本家ラズパイ公式の「bookworm専用」のクリーンな pi-gen をクローン
      - name: Clone Official pi-gen (Bookworm Branch)
        run: |
          git clone --depth 1 --branch bookworm https://github.com/rpi-distro/pi-gen.git pi-gen-core

      # 3. あなたのカスタムファイルを公式の pi-gen 環境にインジェクション（注入）
      - name: Inject Custom Configurations
        run: |
          mkdir -p pi-gen-core/stage2/05-custom-apps
          if [ -d user-custom/stage2/05-custom-apps ]; then
            cp -r user-custom/stage2/05-custom-apps/* pi-gen-core/stage2/05-custom-apps/
          fi
          
          if [ -f user-custom/config ]; then
            cp user-custom/config pi-gen-core/config
          else
            echo "IMG_NAME='TurboPiOS'" > pi-gen-core/config
            echo "RELEASE='bookworm'" >> pi-gen-core/config
            echo "ENABLE_SSH=1" >> pi-gen-core/config
            echo "FIRST_USER_NAME='pi'" >> pi-gen-core/config
            echo "FIRST_USER_PASS='raspberry'" >> pi-gen-core/config
            echo "USE_QEMU=1" >> pi-gen-core/config
          fi
          
          # Dockerビルド用のセーフティ設定を追記
          echo "PRESERVE_CONTAINER=1" >> pi-gen-core/config

      # 4. Windowsの改行コード(CRLF)の嫌がらせをここで確実に抹殺
      - name: Fix Line Endings and Permissions
        run: |
          find pi-gen-core/stage2/05-custom-apps/ -type f -name "*.sh" -exec sed -i 's/\r$//' {} + || true
          find pi-gen-core/stage2/05-custom-apps/ -type f -name "*.sh" -exec chmod +x {} + || true

      # 5. Dockerビルドに最適な方法でQEMUをセットアップ
      - name: Setup QEMU for ARM (Docker-friendly)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      # 6. 公式ベースのディレクトリに移動して Docker ビルドを実行！
      - name: Build TurboPi OS
        shell: bash
        run: |
          cd pi-gen-core
          chmod +x build-docker.sh
          bash ./build-docker.sh

      # ===== デバッグ ＆ 成果物回収（あなたの優秀なコードをベースにパスを最適化） =====
      - name: Show deploy contents
        if: always()
        run: |
          echo "===== DEPLOY ====="
          find pi-gen-core/deploy 2>/dev/null || true

      - name: Show debootstrap log
        if: always()
        run: |
          echo "===== DEBOOTSTRAP LOG ====="
          cat pi-gen-core/work/*/stage0/debootstrap.log 2>/dev/null || true

      - name: Upload Image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TurboPiOS
          path: |
            pi-gen-core/deploy/**
            pi-gen-core/work/**/deploy/**
