name: Build TurboPi OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static binfmt-support

      - name: Build TurboPi OS
        shell: bash
        run: |
          chmod +x build-docker.sh
          bash ./build-docker.sh

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: TurboPiOS
          path: deploy/**
